name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLIENT_ORIGIN: ${{ vars.CLIENT_ORIGIN }}
      FEEDBACK_WEBHOOK_URL: ${{ secrets.FEEDBACK_WEBHOOK_URL }}
      FEEDBACK_SECRET_KEY: ${{ secrets.FEEDBACK_SECRET_KEY }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            VivahGo/package-lock.json

      - name: Install root dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Install app dependencies
        run: npm ci --prefix VivahGo || npm install --prefix VivahGo --no-audit --no-fund

      - name: Run root test suite
        run: npm test

      - name: Lint app
        run: npm run lint --prefix VivahGo

      - name: Build app
        run: npm run build --prefix VivahGo
